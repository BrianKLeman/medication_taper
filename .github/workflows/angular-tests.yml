name: Angular Tests # generated by claude.ai

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run tests
      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage
        continue-on-error: true  # 👈 so we still email even if tests fail

      # 5. Upload test results as artifact
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()  # 👈 run even if tests failed
        with:
          name: test-results
          path: |
            test-results/
            coverage/

      # 6. Publish test report (shows in GitHub UI)
      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Angular Test Results
          path: test-results/test-results.xml
          reporter: java-junit

     
