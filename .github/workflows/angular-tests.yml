name: Angular Tests # generated by claude.ai

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory:  /home/runner/work/medication_taper/medication_taper/medication_taper  # 👈 change to your folder name
        
    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6        
        with:
          node-version: '22'   # use 22 or 24, avoid 20
          cache: 'npm'
          cache-dependency-path: /home/runner/work/medication_taper/medication_taper/medication_taper
        
      - name: Install dependencies
        run: npm ci
        working-directory:  /home/runner/work/medication_taper/medication_taper/medication_taper

      # 4. Run tests
      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage
        continue-on-error: true  # 👈 so we still email even if tests fail

      # 5. Upload test results as artifact
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()  # 👈 run even if tests failed
        with:
          name: test-results
          path: |
            test-results/
            coverage/

      # 6. Publish test report (shows in GitHub UI)
      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Angular Test Results
          path: test-results/test-results.xml
          reporter: java-junit

     
