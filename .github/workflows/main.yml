name: Build Angular App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory:  /home/runner/work/medication_taper/medication_taper/medication_taper  # 👈 change to your folder name
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: List directory contents
        run: ls /home/runner/work/medication_taper/medication_taper/medication_taper

      - name: List Present Working directory
        run: pwd
        
      - name: Set up Node.js
        uses: actions/setup-node@v6        
        with:
          node-version: '22'   # use 22 or 24, avoid 20
          cache: 'npm'
          cache-dependency-path: /home/runner/work/medication_taper/medication_taper/medication_taper

      - name: List directory contents
        run: ls -la /home/runner/work/medication_taper/medication_taper/medication_taper

      - name: List Present Working directory
        run: pwd
        
      - name: Install dependencies
        run: npm ci
        working-directory:  /home/runner/work/medication_taper/medication_taper/medication_taper
        
      - name: Build
        run: npm run build -- --configuration production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: /home/brian/artifact
