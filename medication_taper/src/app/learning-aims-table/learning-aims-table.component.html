
<table class="tableBody">
  <thead class="tableHeader">
    <th>Notes</th>
    <th>Created</th>
    <th>Name</th>
    <th>Description</th>
    <th>Achieved Date</th>
  </thead>
  <tbody>
    @for (d of aims; track d; let i = $index) {
      <tr  [ngClass]="{'altTableRow' : i%2 == 0}">
        <ng-container>
          <td class="commands">
            <button (click)="showNotes(d);" class="action"><i class="bi bi-sticky-fill"></i></button>
            <button (click)="showTasks(d);" class="action"><i class="bi bi-list-task"></i></button>
          </td>
          <td class="date">{{ adjustForTimezone(d.CreatedDate) | date: 'fullDate'}}</td>
          <td class="text">{{ d.Name }}</td>
          <td class="text">{{ d.Description }}</td>
          <td class="date">{{ adjustForTimezone(d.AchievedDate) | date: 'fullDate'}}</td>
        </ng-container>
      </tr>
      @if (d.ShowNotes) {
        <tr [ngClass]="{'altTableRow' : i%2 == 0}" >
          <td colspan="5">
            <app-notes-table [entity]="d.Id" [showNotes]="d.ShowNotes" tableName="LEARNING_AIMS" ></app-notes-table>
          </td>
        </tr>
      }
      @if (d.ShowTasks) {
        <tr [ngClass]="{'altTableRow' : i%2 == 0}" >
          <td colspan="5">
            <app-kanban-board [recordID]="d.Id" table="LEARNING_AIMS" ></app-kanban-board>
          </td>
        </tr>
      }
    }
  </tbody>
</table>
