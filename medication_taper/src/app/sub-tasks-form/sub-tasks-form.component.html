<h4 mat-dialog-title>Add Task<h4>
    <mat-dialog-content class="mat-typography"> 
        <app-sub-tasks-edit #subTaskEdit [inDialog]="true"></app-sub-tasks-edit>
    </mat-dialog-content>
    <mat-dialog-actions align="end">        
        <button class="saveButton" mat-button [mat-dialog-close]="true" (click)="subTaskEdit.onSubmit()" cdkFocusInitial>Save</button>
        <button class="cancelButton" mat-button mat-dialog-close>Cancel</button>
    </mat-dialog-actions>
